<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>My first three.js app</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
      }
      #myCanvas {
        width: 100%;
        height: 100%;
        display: block;
      }
      #info {
        position: absolute;
        left: 1em;
        top: 1em;
        background: rgba(0,0,0,.8);
        padding: .5em;
        color: white;
        font-family: monospace;
      }
    </style>
  </head>
  <body>
    <canvas id="myCanvas"></canvas>
    <div id="info"></div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
