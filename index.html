<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <title>Three.js 学习</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #0f0f1a;
        color: #e0e0e0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      h1 {
        font-size: 2.5rem;
        margin-bottom: 2rem;
        background: linear-gradient(135deg, #667eea, #764ba2);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 1.5rem;
        max-width: 600px;
        width: 90%;
      }
      .card {
        background: #1a1a2e;
        border: 1px solid #2a2a4a;
        border-radius: 12px;
        padding: 2rem;
        text-align: center;
        text-decoration: none;
        color: #e0e0e0;
        transition: all 0.3s ease;
        cursor: pointer;
      }
      .card:hover {
        border-color: #667eea;
        transform: translateY(-4px);
        box-shadow: 0 8px 24px rgba(102, 126, 234, 0.2);
      }
      .card h2 {
        font-size: 1.2rem;
        margin-bottom: 0.5rem;
      }
      .card p {
        font-size: 0.85rem;
        color: #888;
      }
    </style>
  </head>
  <body>
    <h1>🚀 Three.js 学习</h1>
    <div class="grid">
      <a class="card" href="/01-sence/">
        <h2>🎬 场景</h2>
        <p>第一个 Three.js 场景</p>
      </a>
      <!-- 后续添加更多页面入口 -->
    </div>
  </body>
</html>
