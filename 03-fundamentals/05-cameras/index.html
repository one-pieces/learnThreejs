<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>My first three.js app</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
      }
      #myCanvas {
        width: 100%;
        height: 100%;
        display: block;
      }
      .split {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        display: flex;
      }
      .split>div {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <canvas id="myCanvas"></canvas>
    <div class="split">
       <div id="view1" tabindex="1"></div>
       <div id="view2" tabindex="2"></div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
